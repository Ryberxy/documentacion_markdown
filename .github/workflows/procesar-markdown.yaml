# .github/workflows/procesar-markdown.yml
name: Convertir Markdown a PDF

on:
  push:
    branches:
      - main
    paths:
      - 'CKA/**.md'
  workflow_dispatch:
    inputs:
      fichero:
        description: 'Fichero a procesar (ej: CKA/01ArquitecturaKubernetes.md)'
        required: false
        default: ''
jobs:
  convertir:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo markdown
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install pyyaml markdown weasyprint

      - name: Detectar ficheros modificados
        run: |
          if [ -n "${{ github.event.inputs.fichero }}" ]; then
            echo "${{ github.event.inputs.fichero }}" > /tmp/modificados.txt
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD -- 'CKA/**/*.md' > /tmp/modificados.txt
          else
            git diff-tree --no-commit-id -r --name-only HEAD -- 'CKA/' > /tmp/modificados.txt
          fi
          cat /tmp/modificados.txt

      - name: Convertir a PDF
        run: |
          python3 scripts/convertir.py /tmp/modificados.txt

      - name: Debug - ver resultado conversión
        run: |
          echo "=== Ficheros modificados ==="
          cat /tmp/modificados.txt
          echo "=== Contenido /tmp/pdfs ==="
          ls -la /tmp/pdfs/ || echo "directorio vacio o no existe"

      - name: Checkout repo documentacion
        uses: actions/checkout@v4
        with:
          repository: Ryberxy/documentacion_estudio
          token: ${{ secrets.DOCS_TOKEN }}
          path: documentacion_estudio

      - name: Copiar PDFs al repo destino
        run: |
          while IFS= read -r fichero; do
            if [ -f "/tmp/pdfs/$(basename ${fichero%.md}).pdf" ]; then
              SUBDIR=$(dirname $fichero)
              mkdir -p documentacion_estudio/$SUBDIR
              cp "/tmp/pdfs/$(basename ${fichero%.md}).pdf" "documentacion_estudio/$SUBDIR/"
            fi
          done < /tmp/modificados.txt

      - name: Push al repo documentacion
        run: |
          cd documentacion_estudio
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add CKA/
          git diff --staged --quiet || git commit -m "PDF generado desde ${{ github.sha }}"
          git push
