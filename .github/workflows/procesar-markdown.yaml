# .github/workflows/procesar-markdown.yml
name: Convertir Markdown a PDF

on:
  push:
    branches:
      - main
    paths:
      - 'CKA/**.md'
  workflow_dispatch:

jobs:
  convertir:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo markdown
        uses: actions/checkout@v4

      - name: Checkout repo documentacion
        uses: actions/checkout@v4
        with:
          repository: Ryberxy/documentacion_estudio
          token: ${{ secrets.DOCS_TOKEN }}
          path: documentacion_estudio

      - name: Detectar markdowns sin PDF
        run: |
          > /tmp/modificados.txt
          find CKA/ -name "*.md" | while read md; do
            pdf="documentacion_estudio/${md%.md}.pdf"
            if [ ! -f "$pdf" ]; then
              echo ">>> Sin PDF: $md"
              echo "$md" >> /tmp/modificados.txt
            else
              echo ">>> Ya existe: $pdf, saltando"
            fi
          done
          echo "=== Ficheros a procesar ==="
          cat /tmp/modificados.txt

      - name: Instalar dependencias
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-pip
          pip3 install pyyaml markdown weasyprint

      - name: Convertir a PDF
        run: |
          python3 scripts/convertir.py /tmp/modificados.txt

      - name: Debug - ver resultado conversión
        run: |
          echo "=== Ficheros a procesar ==="
          cat /tmp/modificados.txt
          echo "=== Contenido /tmp/pdfs ==="
          ls -la /tmp/pdfs/ || echo "directorio vacio o no existe"

      - name: Copiar PDFs al repo destino
        run: |
          while IFS= read -r fichero; do
            pdf="/tmp/pdfs/$(basename ${fichero%.md}).pdf"
            if [ -f "$pdf" ]; then
              SUBDIR=$(dirname $fichero)
              mkdir -p "documentacion_estudio/$SUBDIR"
              cp "$pdf" "documentacion_estudio/$SUBDIR/"
              echo ">>> Copiado: $pdf → documentacion_estudio/$SUBDIR/"
            fi
          done < /tmp/modificados.txt

      - name: Push al repo documentacion
        run: |
          cd documentacion_estudio
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet && echo ">>> Nada nuevo que subir" || \
            (git commit -m "PDFs generados desde ${{ github.sha }}" && git push)
